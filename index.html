function switchTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-register').classList.toggle('active', mode === 'register');
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Iniciar sesión' : 'Registrarse';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}

  const password = document.getElementById('auth-password').value;

  const sucEl = document.getElementById('auth-success');

  if (!email || !password) { errEl.textContent = 'Por favor completa todos los campos.'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('auth-btn');
  btn.disabled = true; btn.textContent = 'Cargando...';
  if (authMode === 'register') {
    const { error } = await supabase.auth.signUp({ email, password });
    if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; }
    else { sucEl.textContent = '¡Registro exitoso! Ya puedes usar EDUTECH.'; sucEl.style.display = 'block'; }
  } else {
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { errEl.textContent = 'Correo o contraseña incorrectos.'; errEl.style.display = 'block'; }
  }
  btn.disabled = false;
  btn.textContent = authMode === 'login' ? 'Iniciar sesión' : 'Registrarse';
}

async function loginGoogle() {
  await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
}

async function logout() {
  await supabase.auth.signOut();
  state = { xp:0, lives:5, streak:0, completed:{}, currentUnit:null, qIndex:0, correct:0, answered:false, selectedAnswer:null };
}

async function loadProfile() {
  const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
  if (data) { state.xp = data.xp||0; state.lives = data.lives||5; state.streak = data.streak||0; state.completed = data.completed||{}; }
  else { await supabase.from('profiles').insert({ id: currentUser.id, email: currentUser.email, xp:0, lives:5, streak:0, completed:{} }); }
}

async function saveProfile() {
  if (!currentUser) return;
  const ind = document.getElementById('saving-indicator');
  ind.textContent = 'Guardando...';
  await supabase.from('profiles').upsert({ id: currentUser.id, email: currentUser.email, xp: state.xp, lives: state.lives, streak: state.streak, completed: state.completed, updated_at: new Date().toISOString() });
  ind.textContent = '✓ Progreso guardado';
  setTimeout(() => ind.textContent = '', 2000);
}

function isUnlocked(unit) { return unit.req.every(r => state.completed[r]); }

function renderHome() {
  const email = currentUser?.email || '';
  document.getElementById('user-avatar').textContent = email.charAt(0).toUpperCase();
  document.getElementById('user-name').textContent = email;
  document.getElementById('home-xp').textContent = state.xp + ' XP';
  document.getElementById('home-lives').textContent = state.lives;
  document.getElementById('home-streak').textContent = state.streak;
  [1,2,3].forEach(tier => {
    const grid = document.getElementById('grid-' + tier);
    grid.innerHTML = '';
    UNITS.filter(u => u.tier === tier).forEach(u => {
      const done = !!state.completed[u.id];
      const unlocked = isUnlocked(u);
      const card = document.createElement('div');
      card.className = 'unit-card' + (done?' completed':'') + (!unlocked?' locked':'');
      const badgeClass = done?'badge-done':(!unlocked?'badge-locked':tier===3?'badge-hard':'badge-new');
      const badgeText = done?'✓ Listo':(!unlocked?'🔒':tier===3?'Avanzado':'Nuevo');
      card.innerHTML = `<span class="unit-badge ${badgeClass}">${badgeText}</span><div class="unit-icon">${u.icon}</div><div class="unit-name">${u.name}</div><div class="unit-meta">${done?'★★★':(unlocked?'☆☆☆':'— — —')}</div>`;
      if (unlocked) card.addEventListener('click', () => startUnit(u.id));
      grid.appendChild(card);
    });
  });
}

function startUnit(id) {
  state.currentUnit=id; state.qIndex=0; state.correct=0; state.answered=false; state.selectedAnswer=null;
  showScreen('exercise'); renderQuestion();
}

function renderQuestion() {
  const unit = UNITS.find(u => u.id===state.currentUnit);
  const q = unit.questions[state.qIndex];
  const total = unit.questions.length;
  document.getElementById('ex-lives').textContent = state.lives;
  document.getElementById('progress-bar').style.width = (state.qIndex/total*100)+'%';
  document.getElementById('q-label').textContent = `PREGUNTA ${state.qIndex+1} DE ${total}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('feedback-bar').className = 'feedback-bar';
  document.getElementById('check-btn').textContent = 'Comprobar';
  document.getElementById('check-btn').disabled = true;
  state.answered=false; state.selectedAnswer=null;
  const body = document.getElementById('q-body');
  if (q.type==='choice') {
    const shuffled = [...q.choices].sort(()=>Math.random()-0.5);
    body.innerHTML = `<div class="choices-grid">${shuffled.map(c=>`<button class="choice-btn" onclick="selectChoice(this,${c})">${c}</button>`).join('')}</div>`;
  } else {
    body.innerHTML = `<input class="fill-input" type="number" id="fill-input" placeholder="?" oninput="onFillInput(this)" />`;
    setTimeout(()=>document.getElementById('fill-input')?.focus(),50);
  }
}

function selectChoice(btn, val) {
  if (state.answered) return;
  document.querySelectorAll('.choice-btn').forEach(b=>{ b.style.borderColor=''; b.style.background=''; b.style.color=''; });
  btn.style.borderColor='#1D9E75'; btn.style.background='#f0fdf4'; btn.style.color='#1D9E75';
  state.selectedAnswer=val; document.getElementById('check-btn').disabled=false;
}

function onFillInput(input) {
  document.getElementById('check-btn').disabled = input.value.trim()==='';
  state.selectedAnswer = input.value.trim()==='' ? null : Number(input.value);
}

function checkAnswer() {
  if (state.answered) { nextQuestion(); return; }
  state.answered=true;
  const unit = UNITS.find(u=>u.id===state.currentUnit);
  const q = unit.questions[state.qIndex];
  const correct = Math.abs(Number(state.selectedAnswer)-Number(q.answer))<0.001;
  const fb = document.getElementById('feedback-bar');
  if (correct) {
    state.correct++;
    fb.className='feedback-bar correct-fb';
    document.getElementById('fb-icon').className='ti ti-circle-check';
    document.getElementById('fb-text').textContent='¡Correcto! 🎉';
    if (q.type==='choice') { document.querySelectorAll('.choice-btn').forEach(b=>{ if(Math.abs(Number(b.textContent)-Number(q.answer))<0.001) b.classList.add('correct'); }); }
    else { const inp=document.getElementById('fill-input'); if(inp){inp.style.borderColor='#16a34a';inp.style.background='#dcfce7';} }
    showXpToast('+10 XP');
  } else {
    state.lives=Math.max(0,state.lives-1);
    document.getElementById('ex-lives').textContent=state.lives;
    fb.className='feedback-bar wrong-fb';
    document.getElementById('fb-icon').className='ti ti-circle-x';
    document.getElementById('fb-text').textContent=`Incorrecto. La respuesta era ${q.answer}`;
    if (q.type==='choice') { document.querySelectorAll('.choice-btn').forEach(b=>{ if(Math.abs(Number(b.textContent)-Number(q.answer))<0.001) b.classList.add('correct'); else if(Math.abs(Number(b.textContent)-Number(state.selectedAnswer))<0.001) b.classList.add('wrong'); }); }
    else { const inp=document.getElementById('fill-input'); if(inp){inp.style.borderColor='#dc2626';inp.style.background='#fee2e2';} }
  }
  document.querySelectorAll('.choice-btn, .fill-input').forEach(el=>el.disabled=true);
  const btn=document.getElementById('check-btn'); btn.textContent='Siguiente →'; btn.disabled=false;
}

function nextQuestion() {
  const unit=UNITS.find(u=>u.id===state.currentUnit); state.qIndex++;
  if (state.qIndex>=unit.questions.length||state.lives===0) finishLesson(); else renderQuestion();
}

function finishLesson() {
  const unit=UNITS.find(u=>u.id===state.currentUnit);
  const total=unit.questions.length;
  const won=state.correct>=Math.ceil(total*0.6);
  const xpEarned=state.correct*10;
  state.xp+=xpEarned;
  if(won){state.streak++;state.completed[state.currentUnit]=true;}else state.streak=Math.max(0,state.streak-1);
  saveProfile();
  document.getElementById('result-icon').textContent=won?'🎉':'😅';
  document.getElementById('result-title').textContent=won?'¡Lección completada!':'Sigue intentando';
  document.getElementById('result-sub').textContent=won?`Respondiste ${state.correct} de ${total} correctamente`:`Respondiste ${state.correct} de ${total}. ¡Puedes mejorar!`;
  document.getElementById('res-xp').textContent='+'+xpEarned+' XP';
  document.getElementById('res-correct').textContent=state.correct+'/'+total;
  document.getElementById('res-streak').textContent=state.streak;
  showScreen('result');
}

function showXpToast(msg) { const t=document.getElementById('xp-toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
function retryLesson() { startUnit(state.currentUnit); }
function goHome() { if(state.lives===0)state.lives=5; showScreen('home'); renderHome(); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
